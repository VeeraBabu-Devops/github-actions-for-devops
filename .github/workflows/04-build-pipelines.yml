# ==============================================================================
# Workflow Name : Build Pipelines
# Description   : Java, Node.js, and Python examples
# ==============================================================================

name: Build Pipelines

on:
  workflow_dispatch:

jobs:

  java:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - run: java -version

  node:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: node -v

  python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python --version
