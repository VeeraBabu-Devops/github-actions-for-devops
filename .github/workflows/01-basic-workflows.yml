# ==============================================================================
# Workflow Name : Basic Workflows
# Description   : Learn GitHub Actions basic concepts
# Trigger       : Manual
# Runner        : Ubuntu Latest
# Level         : Beginner
# ==============================================================================

name: Basic Workflows

on:
  workflow_dispatch:

env:
  COMPANY: OpenTech
  COURSE: GitHub Actions

jobs:
  hello-world:
    name: Hello World
    runs-on: ubuntu-latest

    steps:
      - name: Welcome Message
        run: echo "Welcome to GitHub Actions!"

      - name: Multiple Commands
        run: |
          echo "Current Date:"
          date
          echo "Current User:"
          whoami

      - name: Display System Information
        run: |
          echo "Working Directory:"
          pwd
          echo "Hostname:"
          hostname
          echo "Memory:"
          free -m
          echo "Disk Usage:"
          df -h

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print Environment Variables
        run: |
          echo "Company: $COMPANY"
          echo "Course: $COURSE"
