# ==============================================================================
# Workflow Name : AWS Deployment
# Description   : Deploy static website to Amazon S3
# ==============================================================================

name: AWS Deployment

on:
  workflow_dispatch:

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync Files to S3
        run: |
          aws s3 sync ./ s3://YOUR_BUCKET_NAME --delete

      - name: CloudFront Invalidation (Optional)
        run: |
          echo "Create CloudFront invalidation here."

      - name: EC2 Deployment (Placeholder)
        run: |
          echo "Deploy to EC2 using SSH or SSM."
